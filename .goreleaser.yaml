version: 2

builds:
  - id: wt
    main: ./cmd/wt
    binary: wt
    ldflags:
      - -s -w
      - -X github.com/bkildow/wt-cli/cmd.version={{.Version}}
      - -X github.com/bkildow/wt-cli/cmd.commit={{.ShortCommit}}
      - -X github.com/bkildow/wt-cli/cmd.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"
      - "^Merge"
